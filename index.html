<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVIET_GPS_V1</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --green: #00FF41;
            --dim-green: #003300;
            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            color: var(--green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Header Taktikal */
        .header {
            border-bottom: 1px solid var(--green);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        /* Kawasan Radar Utama */
        .radar-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .radar-circle {
            width: 280px;
            height: 280px;
            border: 1px solid var(--green);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 15px var(--dim-green);
        }

        /* Grid Crosshair */
        .radar-circle::before, .radar-circle::after {
            content: '';
            position: absolute;
            background-color: var(--dim-green);
        }
        .radar-circle::before { width: 100%; height: 1px; top: 50%; }
        .radar-circle::after { width: 1px; height: 100%; left: 50%; }

        /* Anak Panah Taktikal */
        #arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 40px solid var(--green);
            margin-left: -15px;
            margin-top: -30px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 5px var(--green));
        }

        /* Panel Info & Input */
        .data-panel {
            border-top: 1px solid var(--green);
            padding: 15px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 10px;
            display: flex;
            gap: 5px;
        }

        input {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 5px;
            font-family: inherit;
            flex-grow: 1;
        }

        button {
            background: var(--green);
            color: var(--bg);
            border: none;
            padding: 5px 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            font-size: 12px;
        }

        .system-log {
            font-size: 10px;
            color: var(--dim-green);
            margin-top: 10px;
            border-top: 1px dashed var(--dim-green);
            padding-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="coords-live">LOC: SEARCHING...</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="radar-container">
        <div class="radar-circle">
            <div id="arrow"></div>
        </div>
    </div>

    <div class="data-panel">
        <div class="input-group">
            <input type="text" id="target-input" placeholder="LAT, LON (EG: 3.13, 101.68)">
            <button onclick="setTarget()">LOCK</button>
        </div>

        <div class="stats">
            <div>DST_TGT: <span id="dist-out">0.00</span> KM</div>
            <div>BRG_DEG: <span id="brg-out">000</span>°</div>
            <div>V_SPEED: <span id="spd-out">0</span> KM/H</div>
            <div>STATUS : <span id="status-out">IDLE</span></div>
        </div>

        <div class="system-log" id="log">
            SYSTEM_READY: NPU_LOAD_MINIMAL. WAITING_FOR_COORDS...
        </div>
    </div>

    <script>
        let target = { lat: null, lon: null };
        let currentPos = { lat: null, lon: null };

        // Kemas kini Jam
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function setTarget() {
            const val = document.getElementById('target-input').value;
            const parts = val.split(',');
            if (parts.length === 2) {
                target.lat = parseFloat(parts[0]);
                target.lon = parseFloat(parts[1]);
                document.getElementById('status-out').innerText = "LOCKED";
                document.getElementById('log').innerText = "TARGET_ACQUIRED: VECTOR_CALCULATING...";
            }
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        navigator.geolocation.watchPosition((pos) => {
            currentPos.lat = pos.coords.latitude;
            currentPos.lon = pos.coords.longitude;
            
            document.getElementById('coords-live').innerText = `LOC: ${currentPos.lat.toFixed(4)}, ${currentPos.lon.toFixed(4)}`;
            document.getElementById('spd-out').innerText = Math.round(pos.coords.speed * 3.6) || 0;

            if (target.lat !== null) {
                const bearing = calculateBearing(currentPos.lat, currentPos.lon, target.lat, target.lon);
                const distance = calculateDistance(currentPos.lat, currentPos.lon, target.lat, target.lon);
                
                // Pusingkan anak panah berdasarkan bearing
                // Jika peranti ada kompas (heading), bearing perlu ditolak heading (heading - bearing)
                document.getElementById('arrow').style.transform = `rotate(${bearing}deg)`;
                document.getElementById('brg-out').innerText = Math.round(bearing);
                document.getElementById('dist-out').innerText = distance.toFixed(2);
            }
        }, (err) => {
            document.getElementById('log').innerText = "ERROR: GPS_SIGNAL_LOST";
        }, {
            enableHighAccuracy: true
        });

        // Register Service Worker untuk Offline PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
